seed: 42

actor_hidden_dims: [1024, 512]
critic_hidden_dims: [1024, 512]
disc_hidden_dims: [1024, 512]
activation: relu
fixed_action_std: 0.05

rollout_steps: 32
max_iterations: 5000
actor_epochs: 5
critic_epochs: 2
disc_epochs: 2
minibatch_size: 16384

discount: 0.99
gae_lambda: 0.95
ppo_clip_ratio: 0.2
value_loss_coef: 1.0
entropy_coef: 0.0
max_grad_norm: 1.0

disc_reward_scale: 2.0
disc_grad_penalty: 2.0
disc_logit_reg: 0.01
disc_replay_capacity: 200000
disc_replay_samples: 1000

task_reward_weight: 0.0
disc_reward_weight: 1.0

actor_optimizer:
  type: sgd
  learning_rate: 1.0e-4

critic_optimizer:
  type: sgd
  learning_rate: 1.0e-4

disc_optimizer:
  type: sgd
  learning_rate: 2.5e-4
  weight_decay: 1.0e-4

save_interval: 100
log_interval: 10

