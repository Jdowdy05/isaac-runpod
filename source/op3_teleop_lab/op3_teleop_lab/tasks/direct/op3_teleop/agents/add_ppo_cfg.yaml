seed: 42

teacher_hidden_dims: [1024, 512]
student_hidden_dims: [512, 256]
critic_hidden_dims: [1024, 512]
disc_hidden_dims: [1024, 512]
activation: relu
teacher_exploration_std: 0.05
student_rnn_hidden_dim: 256

rollout_steps: 32
max_iterations: 5000
teacher_epochs: 5
critic_epochs: 2
disc_epochs: 2
student_epochs: 2
minibatch_size: 16384
student_batch_size: 16384

discount: 0.99
gae_lambda: 0.95
ppo_clip_ratio: 0.2
value_loss_coef: 1.0
entropy_coef: 0.0
max_grad_norm: 1.0

disc_reward_scale: 2.0
disc_grad_penalty: 2.0
disc_logit_reg: 0.01
disc_replay_capacity: 200000
disc_replay_samples: 1000

task_reward_weight: 0.02
disc_reward_weight: 1.0
student_bc_weight: 1.0

teacher_optimizer:
  type: sgd
  learning_rate: 1.0e-4

student_optimizer:
  type: sgd
  learning_rate: 1.0e-4

critic_optimizer:
  type: sgd
  learning_rate: 1.0e-4

disc_optimizer:
  type: sgd
  learning_rate: 2.5e-4
  weight_decay: 1.0e-4

save_interval: 100
log_interval: 10
