params:
  seed: 42

  algo:
    name: a2c_continuous

  model:
    name: continuous_a2c_logstd
    fixed_sigma: true

  network:
    name: actor_critic
    separate: false
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: -1.0
        fixed_sigma: true
    mlp:
      units: [512, 256, 128]
      activation: elu
      d2rl: false
      initializer:
        name: default
      regularizer:
        name: None

  load_checkpoint: false
  load_path: ""

  config:
    name: g1_teleop_direct
    full_experiment_name: g1_teleop_direct
    env_name: rlgpu
    multi_gpu: false
    ppo: true
    mixed_precision: true
    normalize_input: true
    normalize_value: true
    value_bootstrap: true
    reward_shaper:
      scale_value: 0.01
    gamma: 0.99
    tau: 0.95
    learning_rate: 0.0003
    lr_schedule: adaptive
    kl_threshold: 0.008
    score_to_win: 1000000
    max_epochs: 5000
    save_best_after: 100
    save_frequency: 100
    grad_norm: 1.0
    entropy_coef: 0.0
    truncate_grads: true
    e_clip: 0.2
    horizon_length: 32
    minibatch_size: 32768
    mini_epochs: 5
    critic_coef: 2.0
    clip_value: true
    seq_length: 4
    bounds_loss_coef: 0.0001
